<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ئەپی شۆفێر</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Unikurd+Web&display=swap');
        body { font-family: 'Unikurd Web', sans-serif; background-color: #f8fafc; }
        .hidden { display: none; }
    </style>
</head>
<body class="p-4">

    <!-- بەشی لۆگین -->
    <div id="login-section" class="max-w-md mx-auto mt-20 bg-white p-8 rounded-xl shadow-lg">
        <h2 class="text-2xl font-bold text-center mb-6 text-blue-800">چوونەژوورەوەی شۆفێر</h2>
        <input type="text" id="loginPhone" placeholder="ژمارەی مۆبایل" class="w-full p-3 border rounded-lg mb-4">
        <input type="password" id="loginPass" placeholder="پاسۆرد" class="w-full p-3 border rounded-lg mb-4">
        <button onclick="login()" class="w-full bg-blue-600 text-white p-3 rounded-lg font-bold">داخڵبوون</button>
    </div>

    <!-- بەشی سەرەکی شۆفێر -->
    <div id="main-section" class="hidden max-w-lg mx-auto">
        <div class="flex justify-between items-center bg-blue-900 text-white p-4 rounded-t-lg">
            <div>
                <p id="driverName" class="font-bold"></p>
                <p id="driverRoute" class="text-sm opacity-80"></p>
            </div>
            <div class="text-left">
                <p class="text-xs">باڵنس</p>
                <p id="driverBalance" class="font-bold text-green-400">0</p>
            </div>
        </div>

        <h3 class="text-lg font-bold my-4">داواکارییە نوێیەکان</h3>
        <div id="ordersList" class="space-y-4">
            <!-- لێرە داواکارییەکان دەردەکەون -->
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, increment, collection, query, where, onSnapshot } 
    from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyD3gM3NTJPWz_Gr2Y7RuGNVRNOabyMtPKQ",
        authDomain: "booking-3170f.firebaseapp.com",
        projectId: "booking-3170f",
        storageBucket: "booking-3170f.firebasestorage.app",
        messagingSenderId: "203735208883",
        appId: "1:203735208883:web:a41f37d48f37c79610b1c6"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    let currentDriver = null;

    // کردارەکانی لۆگین
    window.login = async () => {
        const phone = document.getElementById('loginPhone').value;
        const pass = document.getElementById('loginPass').value;

        const docRef = doc(db, "Users", phone);
        const docSnap = await getDoc(docRef);

        if (docSnap.exists() && docSnap.data().password === pass && docSnap.data().role === 'driver') {
            currentDriver = docSnap.data();
            document.getElementById('login-section').classList.add('hidden');
            document.getElementById('main-section').classList.remove('hidden');
            setupUI();
            listenForOrders();
        } else {
            alert("زانیارییەکان هەڵەن یان ئەکاونتەکە شۆفێر نییە");
        }
    };

    function setupUI() {
        document.getElementById('driverName').innerText = currentDriver.name;
        document.getElementById('driverRoute').innerText = "هێڵی: " + currentDriver.route;
        document.getElementById('driverBalance').innerText = currentDriver.balance + " د.ع";
    }

    // گوێگرتن لە داواکارییەکان بەپێی هێڵ و بەروار
    function listenForOrders() {
        const today = new Date().toISOString().split('T')[0];
        const q = query(
            collection(db, "Requests", today, "Orders"),
            where("route", "==", currentDriver.route),
            where("status", "==", "pending")
        );

        onSnapshot(q, (snapshot) => {
            const list = document.getElementById('ordersList');
            list.innerHTML = "";
            
            if(snapshot.empty) {
                list.innerHTML = "<p class='text-center text-gray-500'>هیچ داواکارییەک نییە</p>";
            }

            snapshot.forEach((orderDoc) => {
                const order = orderDoc.data();
                const orderId = orderDoc.id;

                list.innerHTML += `
                    <div class="bg-white p-4 rounded-lg shadow border-r-4 border-blue-600">
                        <div class="flex justify-between items-center mb-3">
                            <span class="bg-gray-100 px-2 py-1 rounded text-sm">${order.time}</span>
                            <span class="font-bold text-blue-700">${order.route}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="acceptOrder('${orderId}')" class="flex-1 bg-green-600 text-white py-2 rounded">قبوڵکردن</button>
                            <button class="bg-gray-200 px-4 py-2 rounded text-sm text-gray-600">پاشگوێخستن</button>
                        </div>
                        <div id="details-${orderId}" class="mt-3 p-2 bg-yellow-50 rounded hidden border border-yellow-200">
                            <p class="text-sm">📱 مۆبایل: <a href="tel:${order.passengerPhone}" class="text-blue-600 font-bold underline">${order.passengerPhone}</a></p>
                            <p class="text-sm mt-1">📍 لۆکەیشن: <a href="${order.location}" target="_blank" class="text-red-600 underline">بینین لەسەر نەخشە</a></p>
                        </div>
                    </div>
                `;
            });
        });
    }

    // قبوڵکردنی داواکاری و بڕینی پارە
    window.acceptOrder = async (orderId) => {
        const today = new Date().toISOString().split('T')[0];
        
        // وەرگرتنی نرخی هێڵەکە لە Settings
        const settingsSnap = await getDoc(doc(db, "Settings", currentDriver.route));
        const dPrice = settingsSnap.exists() ? parseFloat(settingsSnap.data().driverPrice) : 2000;

        if (currentDriver.balance < dPrice) {
            return alert("باڵنست تەواو نییە، تکایە سەرەتا باراوی بکە");
        }

        const tripRef = doc(db, "Requests", today, "Orders", orderId);
        const driverRef = doc(db, "Users", currentDriver.phone);

        try {
            await updateDoc(tripRef, { status: "accepted", driverId: currentDriver.phone });
            await updateDoc(driverRef, { 
                balance: increment(-dPrice),
                tripsCount: increment(1) 
            });

            // نیشاندانی زانیارییەکانی سەرنیشین تەنها بۆ ئەم شۆفێرە
            document.getElementById(`details-${orderId}`).classList.remove('hidden');
            
            // نوێکردنەوەی باڵنس لەسەر شاشە
            currentDriver.balance -= dPrice;
            document.getElementById('driverBalance').innerText = currentDriver.balance + " د.ع";

            alert("گەشتەکە قبوڵکرا و بڕی " + dPrice + " لە باڵنست بڕدرا");
        } catch (e) {
            alert("هەڵەیەک ڕوویدا یان گەشتەکە پێشتر قبوڵکراوە");
        }
    };

    // تۆمارکردنی Service Worker بۆ PWA
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js');
    }
</script>
</body>
</html>
